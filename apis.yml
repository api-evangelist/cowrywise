apis:
  - aid: cowrywise:embed-api
    name: Cowrywise Embed API
    description: Investment-as-a-service REST API that allows developers to embed regulated investment products (savings, mutual funds, treasury bills, Eurobonds, equities) into their applications. Supports user account creation, identity verification, portfolio management, funding, liquidation, withdrawals, transactions, and webhooks. Available in NGN and USD.
